apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Release.Name }}-api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["uvicorn"]
          args: ["showrunner_api.main:app", "--host", "0.0.0.0", "--port", "{{ .Values.api.port }}"]
          envFrom:
            - secretRef:
                name: {{ .Values.env.existingSecret }}
          ports:
            - containerPort: {{ .Values.api.port }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.api.port }}
          resources:
{{ toYaml .Values.resources.api | indent 12 }}
