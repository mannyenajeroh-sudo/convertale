name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm build

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pipx install poetry
      - run: poetry install
      - run: poetry run ruff check .
      - run: poetry run pytest

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [web, api]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to ACR
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login "${{ secrets.ACR_REGISTRY }}" -u "${{ secrets.ACR_USERNAME }}" --password-stdin
      - name: Build API image
        run: docker build -t "${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/showrunner-api:${IMAGE_TAG}" apps/api
      - name: Push API image
        run: docker push "${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/showrunner-api:${IMAGE_TAG}"
      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > ~/.kube/config
      - name: Deploy with Helm
        run: |
          helm upgrade --install showrunner infra/helm/showrunner \
            --set image.repository="${{ secrets.ACR_REGISTRY }}/${{ secrets.ACR_NAMESPACE }}/showrunner-api" \
            --set image.tag="${IMAGE_TAG}"
