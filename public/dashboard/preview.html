<!--
  Not a deliverable on its own — just proves the integration. The whole
  character-lock + logo UI below comes from ONE line of markup plus
  dashboard.js; everything else (styles, cards, inputs, previews) is
  built and injected by injectCharacterLockPanel() at runtime.
-->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Panel integration check</title>
<style>
  body { background:#0a0a12; color:#e8e8f0; font-family: system-ui, sans-serif; padding: 32px; max-width: 560px; margin: 0 auto; }
  h1 { font-size: 15px; font-weight: 600; color: #9c8bff; margin-bottom: 4px; }
  p.sub { font-size: 12px; color: #7a7a8c; margin-top: 0; margin-bottom: 24px; }
</style>
</head>
<body>
  <h1>Character &amp; brand lock</h1>
  <p class="sub">This entire panel is one &lt;div id="characterLockPanel"&gt;&lt;/div&gt; — try dropping in a wide, non-square logo file below and confirm it stays whole, uncropped, unstretched.</p>

  <!-- THE ONLY MARKUP REQUIRED -->
  <div id="characterLockPanel"></div>

  <script src="dashboard.js"></script>
</body>
</html>
